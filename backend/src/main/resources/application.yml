server:
  port: 8080

spring:
  application:
    name: collaborative-coding-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/coding_platform_db
    username: postgres
    password: password # Ensure to update with your local DB credentials
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000 # 1 day

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
